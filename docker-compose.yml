version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: aspm
      POSTGRES_PASSWORD: aspm123
      POSTGRES_DB: aspm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aspm"]
      interval: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://aspm:aspm123@db/aspm
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: supersecretkeychangeinproduction
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
